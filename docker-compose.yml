services:
  frontend:
    build: .
    ports:
      - "8081:8080"      # puerto externo distinto al mostrado (80)
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: desafio
    ports:
      - "5433:5432"      # puerto externo distinto al mostrado (5432)
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: